events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    server {
        listen 80;
        server_name localhost; # Can be your domain later if you have one

        root /usr/share/nginx/html; # Default Nginx static files location
        index index.html index.htm;

        location / {
            try_files $uri $uri/ =404; # Serve static files
        }

        # Placeholder for Flask app - we'll activate this later
        # location /app/ {
        #     proxy_pass http://flask_app:8000/; # 'flask_app' will be the Docker service name
        #     proxy_set_header Host $host;
        #     proxy_set_header X-Real-IP $remote_addr;
        #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        #     proxy_set_header X-Forwarded-Proto $scheme;
        # }
    }
}
