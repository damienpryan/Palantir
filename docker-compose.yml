version: '3.8'

services:
  nginx:
    image: nginx:latest # Use the official Nginx Docker image
    ports:
      - "80:80"         # Map host port 80 to container port 80
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro # Mount our custom config
      - ./nginx/html:/usr/share/nginx/html:ro       # Mount our static HTML files
    networks:
      - app_network   # Define a custom network for inter-container comms

networks:
  app_network:
    driver: bridge
